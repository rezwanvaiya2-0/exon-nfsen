# =============================================================================
# NfSen configuration file
# Following the working guide exactly
# =============================================================================

$BASEDIR = "/var/nfsen";
$PREFIX  = '/usr/local/bin';
$USER    = "netflow";
$WWWUSER  = "www-data";
$WWWGROUP = "www-data";

$PROFILERS = 2;

$NFDUMPSRC = '/usr/local/bin/nfdump';
$NFCAPDSRC = '/usr/local/bin/nfcapd';

%sources = (
    'exonhost_microtik' => { 'port' => '2055', 'col' => '#0000ff', 'type' => 'netflow' },
);

$unknow_color = '#ff0000';
$enable_leftmenu = 1;
$enable_topmenu = 1;
$enable_statsgraph = 1;

$profiletimout = 60;
$socktype = 'Unix';
$sockfile = '/var/nfsen/var/run/nfsen.comm';
$PIDFile = '/var/nfsen/var/run/nfsend.pid';
$max_channels_page = 0;
$rrdtool = '/usr/bin/rrdtool';
$debug = 0;

1;
